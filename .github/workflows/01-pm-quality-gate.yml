name: 01 PM Quality Gate

on:
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  pm-quality-check:
    name: Product Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Check PRD structure
        run: python scripts/check_prd.py
